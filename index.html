<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake Game</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            border: 2px solid #fff;
            background: #000;
            max-width: 90vw;
            max-height: 50vh;
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
            width: 200px;
        }
        button {
            padding: 15px;
            font-size: 18px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 5px;
        }
        button:active {
            background: #555;
        }
        .up { grid-column: 2; }
        .left { grid-column: 1; }
        .right { grid-column: 3; }
        .down { grid-column: 2; }
    </style>
</head>
<body>

    <div id="score">Рахунок: 0</div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="controls">
        <button class="up" onclick="changeDirection('UP')">▲</button>
        <button class="left" onclick="changeDirection('LEFT')">◀</button>
        <button class="right" onclick="changeDirection('RIGHT')">▶</button>
        <button class="down" onclick="changeDirection('DOWN')">▼</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const grid = 20;
        let score = 0;

        let snake = [{x: 160, y: 160}];
        let dx = grid;
        let dy = 0;

        let food = {
            x: Math.floor(Math.random() * (canvas.width / grid)) * grid,
            y: Math.floor(Math.random() * (canvas.height / grid)) * grid
        };

        function main() {
            if (hasGameEnded()) {
                alert("Гра закінчена! Ваш рахунок: " + score);
                document.location.reload();
                return;
            }

            setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                moveSnake();
                drawSnake();
                main();
            }, 150);
        }

        function clearCanvas() {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            ctx.fillStyle = 'lightgreen';
            snake.forEach(part => ctx.fillRect(part.x, part.y, grid - 2, grid - 2));
        }

        function moveSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 1;
                document.getElementById("score").innerText = "Рахунок: " + score;
                genFood();
            } else {
                snake.pop();
            }
        }

        function genFood() {
            food.x = Math.floor(Math.random() * (canvas.width / grid)) * grid;
            food.y = Math.floor(Math.random() * (canvas.height / grid)) * grid;
        }

        function drawFood() {
            ctx.fillStyle = 'red';
            ctx.fillRect(food.x, food.y, grid - 2, grid - 2);
        }

        function changeDirection(dir) {
            if (dir === 'LEFT' && dx === 0) { dx = -grid; dy = 0; }
            if (dir === 'UP' && dy === 0) { dx = 0; dy = -grid; }
            if (dir === 'RIGHT' && dx === 0) { dx = grid; dy = 0; }
            if (dir === 'DOWN' && dy === 0) { dx = 0; dy = grid; }
        }

        function hasGameEnded() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x >= canvas.width;
            const hitToptWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y >= canvas.height;
            return hitLeftWall || hitRightWall || hitToptWall || hitBottomWall;
        }

        main();
    </script>
</body>
</html>
