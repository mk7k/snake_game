<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Word Eater Snake</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --canvas-bg: #161b22;
            --snake-head: #2ea44f;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --ui-bg: #21262d;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90vw;
            max-width: 500px;
            margin-bottom: 15px;
            padding: 10px 15px;
            background: var(--ui-bg);
            border-radius: 8px;
            box-shadow: var(--shadow);
        }

        #score {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        .canvas-container {
            position: relative;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            overflow: hidden;
            border: 3px solid #30363d;
        }

        canvas {
            background-color: var(--canvas-bg);
            display: block;
            image-rendering: pixelated;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 25px;
            width: 90vw;
            max-width: 280px;
        }

        button {
            padding: 20px;
            font-size: 1.5rem;
            background: var(--ui-bg);
            color: var(--accent-color);
            border: 2px solid #30363d;
            border-radius: 50%;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }

        button:active {
            background: #30363d;
            transform: scale(0.95);
        }

        .up { grid-column: 2; grid-row: 1; }
        .left { grid-column: 1; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }
        .down { grid-column: 2; grid-row: 3; }

        #gameOverOverlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            z-index: 10;
        }

        #gameOverOverlay h2 { color: #f85149; font-size: 2rem; margin-bottom: 10px; }
        #gameOverOverlay button {
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 1rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div id="targetWord">З'їдено артьомів:</div>
        <div id="score">0</div>
    </div>

    <div class="canvas-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="gameOverOverlay">
            <h2>ГРА ЗАКІНЧЕНА</h2>
            <div id="finalScore">Рахунок: 0</div>
            <button onclick="resetGame()">Грати знову</button>
        </div>
    </div>

    <div class="controls">
        <button class="up" onclick="changeDirection('UP')">▲</button>
        <button class="left" onclick="changeDirection('LEFT')">◀</button>
        <button class="right" onclick="changeDirection('RIGHT')">▶</button>
        <button class="down" onclick="changeDirection('DOWN')">▼</button>
    </div>

    <script>
        // --- НАЛАШТУВАННЯ ---
        // Впишіть сюди слово (бажано капсом)
        const wordToEat = "Артьом"; 
        const gameSpeed = 140; 
        const gridSize = 20;
        // ----------------------

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const overlay = document.getElementById("gameOverOverlay");
        const finalScoreElement = document.getElementById("finalScore");

        let score = 0;
        let snake = [];
        let dx = 0;
        let dy = 0;
        let isGameOver = false;
        let gameInterval;
        let nextDx = gridSize;
        let nextDy = 0;

        // Масив для зберігання літер слова на полі
        let wordBlocks = [];

        ctx.font = `bold ${gridSize - 2}px 'Courier New', monospace`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        function initGame() {
            score = 0;
            snake = [
                { x: 100, y: 200 },
                { x: 80, y: 200 },
                { x: 60, y: 200 }
            ];
            dx = gridSize;
            dy = 0;
            nextDx = gridSize;
            nextDy = 0;
            isGameOver = false;
            
            updateScoreUI();
            genWholeWord();
            overlay.style.display = "none";
            
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, gameSpeed);
        }

        function gameLoop() {
            if (isGameOver) return;

            dx = nextDx;
            dy = nextDy;

            if (checkCollision()) {
                endGame();
                return;
            }

            clearCanvas();
            drawWord();
            moveSnake();
            drawSnake();
        }

        function clearCanvas() {
            ctx.fillStyle = "#161b22";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = "#1b2129";
            ctx.lineWidth = 1;
            for(let x = 0; x < canvas.width; x += gridSize) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for(let y = 0; y < canvas.height; y += gridSize) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                const isHead = index === 0;
                if (isHead) {
                    ctx.fillStyle = "#2ea44f";
                } else {
                    const opacity = Math.max(0.4, 1 - (index / snake.length));
                    ctx.fillStyle = `rgba(35, 134, 54, ${opacity})`;
                }

                drawRoundedRect(ctx, part.x + 1, part.y + 1, gridSize - 2, gridSize - 2, 4);
                
                if (isHead) {
                    ctx.fillStyle = "#fff";
                    let eyeSize = 3;
                    if (dx > 0) {
                        ctx.fillRect(part.x + gridSize - 7, part.y + 5, eyeSize, eyeSize);
                        ctx.fillRect(part.x + gridSize - 7, part.y + gridSize - 8, eyeSize, eyeSize);
                    } else if (dx < 0) {
                        ctx.fillRect(part.x + 4, part.y + 5, eyeSize, eyeSize);
                        ctx.fillRect(part.x + 4, part.y + gridSize - 8, eyeSize, eyeSize);
                    } else if (dy < 0) {
                        ctx.fillRect(part.x + 5, part.y + 4, eyeSize, eyeSize);
                        ctx.fillRect(part.x + gridSize - 8, part.y + 4, eyeSize, eyeSize);
                    } else if (dy > 0) {
                        ctx.fillRect(part.x + 5, part.y + gridSize - 7, eyeSize, eyeSize);
                        ctx.fillRect(part.x + gridSize - 8, part.y + gridSize - 7, eyeSize, eyeSize);
                    }
                }
            });
        }

        function moveSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            
            if (head.x >= canvas.width) head.x = 0;
            else if (head.x < 0) head.x = canvas.width - gridSize;
            if (head.y >= canvas.height) head.y = 0;
            else if (head.y < 0) head.y = canvas.height - gridSize;

            snake.unshift(head);

            // Перевіряємо, чи голова наступила на якусь літеру зі слова
            let eatenBlockIndex = wordBlocks.findIndex(block => block.x === head.x && block.y === head.y);

            if (eatenBlockIndex !== -1) {
                // Видаляємо з'їдену літеру з масиву (змійка росте, бо snake.pop() не викликається)
                wordBlocks.splice(eatenBlockIndex, 1);

                // Якщо з'їли все слово повністю
                if (wordBlocks.length === 0) {
                    score += 1; // Додаємо 1 очко за ціле слово
                    updateScoreUI();
                    genWholeWord();
                }
            } else {
                // Якщо нічого не з'їли, змійка просто повзе
                snake.pop();
            }
        }

        function drawWord() {
            ctx.shadowColor = "#58a6ff";
            ctx.shadowBlur = 8;
            ctx.fillStyle = "#58a6ff";
            
            // Малюємо всі літери, які залишилися на полі
            wordBlocks.forEach(block => {
                ctx.fillText(block.letter, block.x + gridSize / 2, block.y + gridSize / 2 + 1);
            });
            
            ctx.shadowBlur = 0;
        }

        function genWholeWord() {
            let valid = false;
            let startX, startY, isHorizontal;

            while (!valid) {
                wordBlocks = [];
                // Випадковий вибір напрямку слова: горизонтально (true) або вертикально (false)
                isHorizontal = Math.random() > 0.5;
                
                // Генеруємо початкову точку так, щоб слово помістилося в межах екрана
                if (isHorizontal) {
                    startX = Math.floor(Math.random() * ((canvas.width - (wordToEat.length * gridSize)) / gridSize)) * gridSize;
                    startY = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
                } else {
                    startX = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
                    startY = Math.floor(Math.random() * ((canvas.height - (wordToEat.length * gridSize)) / gridSize)) * gridSize;
                }

                valid = true;

                // Заповнюємо масив блоків літерами та перевіряємо перетин зі змійкою
                for (let i = 0; i < wordToEat.length; i++) {
                    let blockX = isHorizontal ? startX + (i * gridSize) : startX;
                    let blockY = isHorizontal ? startY : startY + (i * gridSize);

                    // Перевірка накладання на змійку
                    for (let part of snake) {
                        if (part.x === blockX && part.y === blockY) {
                            valid = false;
                            break;
                        }
                    }

                    wordBlocks.push({
                        x: blockX,
                        y: blockY,
                        letter: wordToEat[i]
                    });
                }
            }
        }

        function checkCollision() {
            const head = snake[0];
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) return true;
            }
            return false;
        }

        function endGame() {
            isGameOver = true;
            clearInterval(gameInterval);
            finalScoreElement.innerText = "Рахунок: " + score;
            overlay.style.display = "flex";
        }

        function resetGame() {
            initGame();
        }

        function changeDirection(newDir) {
            if (isGameOver) return;
            if (newDir === 'LEFT' && dx === 0) { nextDx = -gridSize; nextDy = 0; }
            if (newDir === 'UP' && dy === 0) { nextDx = 0; nextDy = -gridSize; }
            if (newDir === 'RIGHT' && dx === 0) { nextDx = gridSize; nextDy = 0; }
            if (newDir === 'DOWN' && dy === 0) { nextDx = 0; nextDy = gridSize; }
        }

        function updateScoreUI() {
            scoreElement.innerText = score;
        }

        function drawRoundedRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
            ctx.fill();
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp') changeDirection('UP');
            else if (e.key === 'ArrowDown') changeDirection('DOWN');
            else if (e.key === 'ArrowLeft') changeDirection('LEFT');
            else if (e.key === 'ArrowRight') changeDirection('RIGHT');
            else if (e.key === ' ' && isGameOver) resetGame();
        });

        initGame();
    </script>
</body>
</html>
